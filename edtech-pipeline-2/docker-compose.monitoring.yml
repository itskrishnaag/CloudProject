version: "3.8"

services:

  grafana:
    image: grafana/grafana:10.0.0
    container_name: edtech-grafana
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_PASSWORD: edtech2026
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: redis-datasource
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    network_mode: host   # port 3000; reaches prometheus on localhost:9090

  prometheus:
    image: prom/prometheus:latest
    container_name: edtech-prometheus
    restart: unless-stopped

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=2d"
      - "--storage.tsdb.retention.size=80MB"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    network_mode: host   # port 9090; scrapes localhost:8000 (Spark metrics)

volumes:
  grafana_data:
  prometheus_data:
