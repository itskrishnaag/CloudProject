# KEDA ScaledObject — scales edtech-storage-worker based on Kafka consumer group lag.
#
# How it works:
#   KEDA polls Kafka directly (not via Prometheus) and computes:
#     desiredReplicas = ceil(totalLag / lagThreshold)
#
# With lagThreshold=100 and 10 partitions (edtech-events):
#
#   Load        ev/s    Lag (est.)   Desired pods   Actual (capped at 10)
#   ──────────  ──────  ───────────  ─────────────  ──────────────────────
#   Steady       30          ~0           1               1
#   3× spike     90        ~300         ceil(300/100)=3   3
#   10× load    300       ~3000        ceil(3000/100)=30  10 (max)
#   100× load  3000      ~30000       ceil(30000/100)=300 10 (max)
#
# At 10 pods: Kafka assigns 1 partition per pod → full parallel consumption.
# Each pod processes its partition independently → linear throughput scaling.
#
# Requires KEDA v2.x installed in the cluster:
#   kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.13.1/keda-2.13.1.yaml

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: edtech-storage-worker-scaler
  namespace: edtech-pipeline
  labels:
    app: edtech-storage-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edtech-storage-worker

  # Keep at least 1 pod running always (never scale to zero)
  minReplicaCount: 1
  # Max 10 pods = 10 partitions on edtech-events (adding more pods beyond this
  # doesn't help since Kafka won't assign empty partitions)
  maxReplicaCount: 10

  # How often KEDA polls Kafka for lag (seconds)
  pollingInterval: 15

  # How long to wait after lag drops to 0 before scaling back to minReplicas
  cooldownPeriod: 120

  triggers:
    - type: kafka
      metadata:
        # Kafka broker address (EC2-1 Elastic IP, permanent)
        bootstrapServers: "3.7.163.17:9093"
        # Consumer group being monitored — storage_worker.py uses this group
        consumerGroup: "edtech-storage-group"
        # Topic to measure lag on
        topic: "edtech-events"
        # Scale up when lag-per-pod exceeds this threshold
        # Lower = more responsive scaling; 100 is a good balance
        lagThreshold: "100"
        # Start reading from latest offset when a new pod first joins
        offsetResetPolicy: "latest"
